name: Live ratings cron

# Pings the production live-ratings refresh endpoint every 5 minutes.
# The endpoint itself is a no-op unless at least one matchday is in
# `scoring` status with fixtures configured, so this is safe to run
# 24/7 — there is no cost when no match is live.
#
# Required GitHub repo secret:
#   CRON_SECRET — must match the same value set in the Vercel project's
#                 environment variables. Used as a Bearer token by the
#                 endpoint at app/api/cron/live-ratings/route.ts.

on:
  schedule:
    # Every 2 minutes during typical Serie A live windows only:
    # Friday → Monday (UTC days 5,6,0,1), 11:00–22:00 UTC.
    # That spans Saturday lunchtime kickoffs (12:30 CET = 11:30 UTC) and
    # late-night CEST kickoffs (20:45 CEST = 18:45 UTC, plus an hour or
    # two of post-final wrap-up). Outside this window the page's
    # self-pinger handles the rare "user watching off-schedule" case;
    # GitHub Actions stops firing thousands of empty no-op calls.
    # GitHub Actions cron is best-effort and can be delayed by a few
    # minutes during platform load — acceptable for provisional scoring.
    - cron: "*/2 11-22 * * 0,1,5,6"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit live-ratings endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set in this repository"
            exit 1
          fi
          # Length is safe to print — exposes nothing useful.
          echo "secret length: ${#CRON_SECRET}"
          status=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://fantacalcio-statistico.vercel.app/api/cron/live-ratings")
          echo "HTTP status: $status"
          cat /tmp/resp.json
          echo
          [ "$status" = "200" ] || exit 1
